name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python 3.14 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --locked --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format . --check
      - name: Type check
        run: uv run ty check src/chirp_space/ tests/
      - name: Test issue contracts
        run: uv run pytest -q
      - name: Check Chirp application contracts
        run: uv run chirp-space check
