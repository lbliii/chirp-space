{% extends "layout.html" %}
{% block title %}Recover owner access{% end %}
{% block page_content %}
<div class="narrow">
  <header class="page-heading">
    <p class="eyebrow">Owner recovery</p>
    <h1>Use one recovery code</h1>
    <p>A successful recovery consumes the code and revokes every existing owner session.</p>
  </header>
  {% if error %}<div class="notice error" role="alert">{{ error }}</div>{% end %}
  <form method="post" class="form-card" hx-boost="false">
    {{ csrf_field() }}
    <label>Handle<input name="handle" value="{{ handle }}" autocomplete="username" required></label>
    <label>Recovery code<input name="recovery_code" autocomplete="one-time-code" required></label>
    <button class="button primary" type="submit">Recover access</button>
  </form>
</div>
{% end %}
